name: Governance Evidence

on:
  workflow_dispatch:
  schedule:
    - cron: "41 3 * * 1"

permissions:
  contents: read

concurrency:
  group: governance-evidence-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evidence:
    if: (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - name: Collect live governance evidence
        env:
          GITHUB_TOKEN: ${{ secrets.GH_AUTH_TOKEN }}
        run: >-
          node scripts/check-github-governance-evidence.mjs
          --fetch
          --repo "$GITHUB_REPOSITORY"
          --json governance-evidence.json
          --summary "$GITHUB_STEP_SUMMARY"
      - name: Collect retired dependency evidence
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GH_AUTH_TOKEN }}
        run: >-
          node scripts/check-retired-dependency-evidence.mjs
          --fetch
          --repo "$GITHUB_REPOSITORY"
          --json retired-dependency-evidence.json
          --summary "$GITHUB_STEP_SUMMARY"
      - name: Upload governance evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: governance-evidence
          path: |
            governance-evidence.json
            retired-dependency-evidence.json
          if-no-files-found: warn
          retention-days: 30
