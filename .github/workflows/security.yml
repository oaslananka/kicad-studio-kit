name: Security

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  pnpm_config_pm_on_fail: ignore

jobs:
  dependency-review:
    if: ${{ (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') && github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          fail-on-severity: high
          show-patched-versions: true

  security:
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true

      - run: corepack enable
      - run: corepack prepare pnpm@11.6.0 --activate
      - run: corepack pnpm install --frozen-lockfile
      - name: Install actionlint 1.7.12
        shell: bash
        env:
          ACTIONLINT_VERSION: 1.7.12
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/actionlint.tar.gz"
          bin_dir="$RUNNER_TEMP/actionlint-bin"
          curl --fail --location --silent --show-error \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            --output "$archive"
          echo "${ACTIONLINT_SHA256}  ${archive}" | sha256sum --check --strict -
          mkdir -p "$bin_dir"
          tar -xzf "$archive" -C "$bin_dir" actionlint
          echo "$bin_dir" >> "$GITHUB_PATH"
      - run: corepack pnpm run check:forbidden-refs
      - run: corepack pnpm run check:security-tooling
      - run: corepack pnpm run security:workflows
      - run: corepack pnpm run test:semgrep-rules
      - run: corepack pnpm run security:semgrep
      - run: corepack pnpm audit --audit-level high

  extension-security-regressions:
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - run: corepack enable
      - run: corepack prepare pnpm@11.6.0 --activate
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm --filter kicadstudiokit run test:security
