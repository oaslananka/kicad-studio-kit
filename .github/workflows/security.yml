name: Security

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          version-file: packages/mcp-server/uv.toml
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: uv sync --all-extras --frozen --project packages/mcp-server
      - run: corepack pnpm run check:forbidden-refs
      - run: corepack pnpm audit --audit-level high
      - run: corepack pnpm --dir packages/mcp-server run security
