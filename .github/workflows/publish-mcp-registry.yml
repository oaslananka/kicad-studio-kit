name: Publish MCP Registry

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    environment: mcp-registry
    defaults:
      run:
        working-directory: packages/mcp-server
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          persist-credentials: false
      - name: Install mcp-publisher
        shell: bash
        env:
          MCP_PUBLISHER_VERSION: v1.7.9
        run: |
          set -euo pipefail
          arch="$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')"
          os="$(uname -s | tr '[:upper:]' '[:lower:]')"
          tmp="$(mktemp -d)"
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_${os}_${arch}.tar.gz" -o "${tmp}/mcp-publisher.tar.gz"
          tar -xzf "${tmp}/mcp-publisher.tar.gz" -C "${tmp}" mcp-publisher
          sudo install -m 0755 "${tmp}/mcp-publisher" /usr/local/bin/mcp-publisher
      - run: mcp-publisher --help
      - run: mcp-publisher login github-oidc
      - name: Dry-run publish
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        run: mcp-publisher publish --dry-run
      - name: Publish
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)
        run: mcp-publisher publish
