name: Sync labels

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/labels.yml

permissions:
  contents: read
  issues: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          persist-credentials: false
      - run: test -s .github/labels.yml
