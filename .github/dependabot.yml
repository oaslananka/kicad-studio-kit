version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Europe/Istanbul"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "dependency-lifecycle"
      - "security"
      - "priority:P1"
      - "product:repo"
      - "area:security"
    assignees:
      - "oaslananka"
    groups:
      npm-security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
    cooldown:
      default-days: 7

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:15"
      timezone: "Europe/Istanbul"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "dependency-lifecycle"
      - "security"
      - "priority:P1"
      - "product:repo"
      - "area:security"
    assignees:
      - "oaslananka"
    groups:
      github-actions-security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
    cooldown:
      default-days: 7
