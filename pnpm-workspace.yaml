packages:
  - "apps/vscode-extension"
  - "packages/kicad-fixtures"
  - "packages/test-harness"

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - tmp@0.2.7
blockExoticSubdeps: true

allowBuilds:
  "@go-task/cli": true
  "@vscode/vsce-sign": true
  esbuild: true
  unrs-resolver: true

ignoredOptionalDependencies:
  - keytar

overrides:
  "brace-expansion@2.1.1": 2.1.2
  "brace-expansion@5.0.6": 5.0.7
  "@vscode/vsce>keytar": "-"
  encoding-sniffer: 1.0.2
  js-yaml: 4.3.0
  exceljs>archiver: 8.0.0
  exceljs>fast-csv: 5.0.7
  exceljs>unzipper: 0.12.3
  diff: 9.0.0
  esbuild: 0.28.1
  glob: 13.0.6
  mocha>serialize-javascript: 7.0.5
  qs: 6.15.2
  tar: 7.5.19
  test-exclude: 8.0.0
  form-data: 4.0.6
  fast-uri: 3.1.4
  linkify-it: 5.0.2
  tmp: 0.2.7
  uuid: 14.0.0
  vite: 6.4.3
  undici: 7.28.0
